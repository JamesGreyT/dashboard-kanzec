# Installed on first deploy only, so certbot can complete the HTTP-01 ACME
# challenge. Replaced by nginx-kanzec.conf once the cert exists.
server {
    listen 80;
    listen [::]:80;
    server_name kanzec.ilhom.work;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 503 "dashboard bootstrapping — acme challenge window open\n";
        add_header Content-Type text/plain;
    }
}
