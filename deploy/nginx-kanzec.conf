# /etc/nginx/sites-available/smart-up-dashboard
# Domain: kanzec.ilhom.work — Kanzec Operations Dashboard.
# Replaces the bootstrap config once Let's Encrypt has issued the cert.

# ─── HTTP → HTTPS redirect (keeps ACME path open for renewals) ──────────────
server {
    listen 80;
    listen [::]:80;
    server_name kanzec.ilhom.work;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kanzec.ilhom.work;

    ssl_certificate     /etc/letsencrypt/live/kanzec.ilhom.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kanzec.ilhom.work/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /opt/dashboard-kanzec/frontend/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 4m;
    gzip on;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    # API proxy
    location /api/ {
        proxy_pass          http://127.0.0.1:8081;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # SSE — /api/ops/reports/{key}/logs streams journalctl.
        proxy_read_timeout  1h;
        proxy_send_timeout  1h;
        proxy_buffering     off;
        proxy_cache         off;
        chunked_transfer_encoding off;
    }

    # Long-cache hashed static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — must stay last.
    location / {
        try_files $uri /index.html;
    }
}
